name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with spec file
        run: pyinstaller fixonce.spec

      - name: Create release package
        run: |
          mkdir release
          xcopy /E /I dist\FixOnce release\FixOnce
          copy CLAUDE.md release\
          copy README.md release\
          powershell Compress-Archive -Path release\* -DestinationPath FixOnce-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixOnce-Windows
          path: FixOnce-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with spec file
        run: pyinstaller fixonce_macos.spec

      - name: Create release package
        run: |
          mkdir release
          cp -R dist/FixOnce.app release/
          cp CLAUDE.md release/
          cp README.md release/
          zip -r FixOnce-macOS.zip release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixOnce-macOS
          path: FixOnce-macOS.zip
