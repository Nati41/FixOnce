name: Test Installer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test server starts
        run: |
          cd src
          # Start server in background
          python server.py --flask-only &
          SERVER_PID=$!

          # Wait for server with retry
          for i in {1..15}; do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "[OK] Mac: Server health check passed"
              kill $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            echo "Waiting for server... attempt $i/15"
            sleep 1
          done

          echo "[FAIL] Mac: Server did not start in time"
          kill $SERVER_PID 2>/dev/null || true
          exit 1

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test server starts
        shell: pwsh
        run: |
          # Start server as background process
          $serverProcess = Start-Process -FilePath python -ArgumentList "src/server.py", "--flask-only" -PassThru -NoNewWindow -RedirectStandardOutput "server_out.txt" -RedirectStandardError "server_err.txt"

          # Wait for server with retry
          $maxAttempts = 20
          $success = $false

          for ($i = 1; $i -le $maxAttempts; $i++) {
            Start-Sleep -Seconds 1
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:5000/api/health" -UseBasicParsing -TimeoutSec 2
              if ($response.StatusCode -eq 200) {
                Write-Host "[OK] Windows: Server health check passed"
                $success = $true
                break
              }
            } catch {
              Write-Host "Waiting for server... attempt $i/$maxAttempts"
            }
          }

          # Show server output for debugging
          if (Test-Path "server_err.txt") {
            $errContent = Get-Content "server_err.txt" -Raw
            if ($errContent) {
              Write-Host "Server stderr:"
              Write-Host $errContent
            }
          }

          # Clean up
          if ($serverProcess -and !$serverProcess.HasExited) {
            Stop-Process -Id $serverProcess.Id -Force -ErrorAction SilentlyContinue
          }

          if (-not $success) {
            Write-Host "[FAIL] Windows: Server did not start in time"
            exit 1
          }

  test-installer-script:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test install.py imports
        run: |
          cd scripts
          python -c "import install; print('[OK] install.py imports successfully')"
