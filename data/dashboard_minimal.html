<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixOnce</title>
<style>
:root {
  --bg: #0a0c10;
  --surface: #12151a;
  --border: #1e2430;
  --green: #00e676;
  --amber: #ffb300;
  --red: #ff5252;
  --text: #e0e6ed;
  --text-dim: #6b7785;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  padding: 16px;
  max-width: 380px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo svg {
  width: 24px;
  height: 24px;
  fill: var(--green);
}

.logo-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--green);
}

.version {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: 4px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ai-badge {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}

.ai-dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
}

/* Toggle */
.switch {
  position: relative;
  width: 32px;
  height: 18px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--border);
  border-radius: 18px;
  transition: 0.2s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 12px;
  width: 12px;
  left: 3px;
  bottom: 3px;
  background: var(--text-dim);
  border-radius: 50%;
  transition: 0.2s;
}

input:checked + .slider {
  background: var(--green);
}

input:checked + .slider:before {
  transform: translateX(14px);
  background: white;
}

/* Card */
.card {
  background: var(--surface);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
}

.card-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

/* Project Card */
.project-name {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 2px;
}

.project-goal {
  font-size: 12px;
  color: var(--text-dim);
}

/* Status Card */
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
}

.status-row:not(:last-child) {
  border-bottom: 1px solid var(--border);
}

.status-icon {
  font-size: 14px;
}

.status-text {
  flex: 1;
  font-size: 13px;
}

.status-action {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'SF Mono', Monaco, monospace;
}

.status-ok { color: var(--green); }
.status-warn { color: var(--amber); }
.status-error { color: var(--red); }
.status-fix { color: var(--green); font-weight: 500; }

/* Context Card */
.context-item {
  display: flex;
  gap: 8px;
  padding: 6px 0;
}

.context-item:not(:last-child) {
  border-bottom: 1px solid var(--border);
}

.context-label {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 40px;
}

.context-value {
  font-size: 12px;
  color: var(--text);
}

.context-time {
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
  margin-top: 8px;
}

/* Footer */
.footer {
  text-align: center;
  padding-top: 16px;
  font-size: 11px;
  color: var(--text-dim);
}

/* Powered off state */
body.powered-off .card {
  opacity: 0.5;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: all 0.3s;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.toast.error {
  border-color: var(--red);
  color: var(--red);
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    <span class="logo-text">FixOnce</span>
    <span class="version" id="version">v1.0.12</span>
  </div>
  <div class="header-right">
    <div class="ai-badge">
      <span class="ai-dot"></span>
      <span id="activeAI">Claude</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="powerToggle" checked onchange="togglePower()">
      <span class="slider"></span>
    </label>
  </div>
</div>

<!-- Project -->
<div class="card">
  <div class="card-label">Project</div>
  <div class="project-name" id="projectName">—</div>
  <div class="project-goal" id="projectGoal">No active project</div>
</div>

<!-- Status -->
<div class="card">
  <div class="card-label">Status</div>
  <div id="statusContent">
    <div class="status-row">
      <span class="status-icon status-ok">✓</span>
      <span class="status-text">System healthy</span>
    </div>
  </div>
</div>

<!-- Context -->
<div class="card" id="contextCard" style="display: none;">
  <div class="card-label">Context</div>
  <div id="contextContent">
    <div class="context-item">
      <span class="context-label">Last</span>
      <span class="context-value" id="lastChange">—</span>
    </div>
    <div class="context-item">
      <span class="context-label">Next</span>
      <span class="context-value" id="nextStep">—</span>
    </div>
  </div>
  <div class="context-time" id="syncTime"></div>
</div>

<!-- Footer -->
<div class="footer">FixOnce — AI Memory Layer</div>

<script>
const API = window.location.origin;

async function fetchData() {
  try {
    const res = await fetch(`${API}/api/dashboard_snapshot`, {
      headers: { 'X-Dashboard': 'true' },
      signal: AbortSignal.timeout(5000)
    });
    if (!res.ok) return;

    const data = await res.json();
    render(data.snapshot || {});
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function render(s) {
  // Project
  const projectName = s.project_name || s.project_id || '—';
  const goal = s.current_goal || s.knowledge?.current_goal || '';
  document.getElementById('projectName').textContent = projectName;
  document.getElementById('projectGoal').textContent = goal || 'No active goal';

  // Active AI
  const activeAI = s.active_ai || s.ai_session?.editor || 'Unknown';
  document.getElementById('activeAI').textContent = capitalize(activeAI);

  // Status - Build status rows
  const statusEl = document.getElementById('statusContent');
  const rows = [];

  // Check for errors
  const errorCount = s.browser_errors?.length || s.error_count || 0;
  const hasAutoFix = s.has_auto_fix || s.auto_fix_available || false;

  if (hasAutoFix) {
    rows.push({
      icon: '✅',
      iconClass: 'status-fix',
      text: 'AUTO-FIX READY',
      action: 'fo_apply'
    });
  }

  if (errorCount > 0) {
    rows.push({
      icon: '⚠️',
      iconClass: 'status-warn',
      text: `${errorCount} error${errorCount > 1 ? 's' : ''} detected`,
      action: 'fo_errors'
    });
  }

  if (rows.length === 0) {
    rows.push({
      icon: '✓',
      iconClass: 'status-ok',
      text: 'No errors',
      action: ''
    });
  }

  statusEl.innerHTML = rows.map(r => `
    <div class="status-row">
      <span class="status-icon ${r.iconClass}">${r.icon}</span>
      <span class="status-text">${r.text}</span>
      ${r.action ? `<span class="status-action">${r.action}</span>` : ''}
    </div>
  `).join('');

  // Context - from intent/live_record
  const intent = s.intent || s.live_record?.intent || {};
  const lastChange = intent.last_change || '';
  const nextStep = intent.next_step || '';

  const contextCard = document.getElementById('contextCard');
  if (lastChange || nextStep) {
    contextCard.style.display = '';
    document.getElementById('lastChange').textContent = lastChange || '—';
    document.getElementById('nextStep').textContent = nextStep || '—';

    // Sync time
    const updatedAt = intent.updated_at;
    if (updatedAt) {
      document.getElementById('syncTime').textContent = 'Synced ' + relativeTime(updatedAt);
    }
  } else {
    contextCard.style.display = 'none';
  }
}

function relativeTime(ts) {
  if (!ts) return '';
  const then = new Date(ts).getTime();
  if (isNaN(then)) return '';
  const diffMs = Date.now() - then;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  return `${Math.floor(diffHr / 24)}d ago`;
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
}

async function togglePower() {
  const toggle = document.getElementById('powerToggle');
  const newMode = toggle.checked ? 'full' : 'off';

  try {
    await fetch(`${API}/api/system/mode`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: newMode })
    });
    document.body.classList.toggle('powered-off', newMode === 'off');
    showToast(newMode === 'full' ? 'FixOnce ON' : 'FixOnce OFF');
  } catch (e) {
    toggle.checked = !toggle.checked;
  }
}

async function loadPowerState() {
  try {
    const res = await fetch(`${API}/api/system/mode`);
    if (res.ok) {
      const data = await res.json();
      const isOn = data.mode === 'full';
      document.getElementById('powerToggle').checked = isOn;
      document.body.classList.toggle('powered-off', !isOn);
    }
  } catch (e) {}
}

function showToast(msg, isError = false) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.textContent = msg;
  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// Init
loadPowerState();
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
