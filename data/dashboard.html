<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixOnce</title>
<style>
:root {
  --bg: #0a0c10;
  --surface: #12151a;
  --border: #1e2430;
  --green: #00e676;
  --amber: #ffb300;
  --red: #ff5252;
  --text: #e0e6ed;
  --text-dim: #6b7785;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  padding: 16px;
  max-width: 380px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo svg {
  width: 24px;
  height: 24px;
}

.logo-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--green);
}

.version {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: 4px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ai-badge {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}

.ai-dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
}

/* Toggle */
.switch {
  position: relative;
  width: 32px;
  height: 18px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--border);
  border-radius: 18px;
  transition: 0.2s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 12px;
  width: 12px;
  left: 3px;
  bottom: 3px;
  background: var(--text-dim);
  border-radius: 50%;
  transition: 0.2s;
}

input:checked + .slider {
  background: var(--green);
}

input:checked + .slider:before {
  transform: translateX(14px);
  background: white;
}

/* Card */
.card {
  background: var(--surface);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
}

.card-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

/* Project Card */
.project-name {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 2px;
}

.project-goal {
  font-size: 12px;
  color: var(--text-dim);
}

/* Status Card */
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
}

.status-row:not(:last-child) {
  border-bottom: 1px solid var(--border);
}

.status-icon {
  font-size: 14px;
}

.status-text {
  flex: 1;
  font-size: 13px;
}

.status-action {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'SF Mono', Monaco, monospace;
}

.status-ok { color: var(--green); }
.status-warn { color: var(--amber); }
.status-error { color: var(--red); }
.status-fix { color: var(--green); font-weight: 500; }

/* Context Card */
.context-item {
  display: flex;
  gap: 8px;
  padding: 6px 0;
}

.context-item:not(:last-child) {
  border-bottom: 1px solid var(--border);
}

.context-label {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 40px;
}

.context-value {
  font-size: 12px;
  color: var(--text);
}

.context-time {
  font-size: 11px;
  color: var(--text-dim);
  text-align: right;
  margin-top: 8px;
}

/* Footer */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 16px;
  font-size: 11px;
  color: var(--text-dim);
}

.footer-links a {
  color: var(--text-dim);
  text-decoration: none;
  margin-left: 12px;
}

.footer-links a:hover {
  color: var(--text);
}

/* System Status (compact) */
.system-status {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 12px 0;
  font-size: 11px;
  color: var(--text-dim);
}

.sys-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.sys-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
}

.sys-item.ok .sys-dot { background: var(--green); }
.sys-item.warn .sys-dot { background: var(--amber); }
.sys-item.error .sys-dot { background: var(--red); }

/* Powered off state */
body.powered-off .card {
  opacity: 0.5;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 12px;
  opacity: 0;
  transition: all 0.3s;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.toast.error {
  border-color: var(--red);
  color: var(--red);
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="eyeTop" x1="16" y1="110" x2="204" y2="98" gradientUnits="userSpaceOnUse">
          <stop stop-color="#1F67C4"/><stop offset="0.55" stop-color="#2FA6E8"/><stop offset="1" stop-color="#39D86F"/>
        </linearGradient>
        <linearGradient id="eyeBottom" x1="16" y1="114" x2="204" y2="126" gradientUnits="userSpaceOnUse">
          <stop stop-color="#1A5CB5"/><stop offset="0.55" stop-color="#2498DE"/><stop offset="1" stop-color="#32CD69"/>
        </linearGradient>
      </defs>
      <path d="M16 110C16 110 51 54 110 54C158 54 187 88 204 103" stroke="url(#eyeTop)" stroke-width="12" stroke-linecap="round"/>
      <path d="M16 110C16 110 51 166 110 166C158 166 187 132 204 117" stroke="url(#eyeBottom)" stroke-width="12" stroke-linecap="round"/>
      <circle cx="110" cy="110" r="41" stroke="#2BA4E2" stroke-width="11"/>
      <path d="M83 88C90 79 100 73 112 70C124 67 136 69 146 76" stroke="#31CF6E" stroke-width="10" stroke-linecap="round"/>
      <path d="M92 109L106 123L137 92" stroke="#2CCF6C" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text">FixOnce</span>
    <span class="version" id="version">v1.0.12</span>
  </div>
  <div class="header-right">
    <div class="ai-badge">
      <span class="ai-dot"></span>
      <span id="activeAI">Claude</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="powerToggle" checked onchange="togglePower()">
      <span class="slider"></span>
    </label>
  </div>
</div>

<!-- Project -->
<div class="card">
  <div class="card-label">Project</div>
  <div class="project-name" id="projectName">—</div>
  <div class="project-goal" id="projectGoal">No active project</div>
</div>

<!-- Status -->
<div class="card">
  <div class="card-label">Status</div>
  <div id="statusContent">
    <div class="status-row">
      <span class="status-icon status-ok">✓</span>
      <span class="status-text">System healthy</span>
    </div>
  </div>
</div>

<!-- Context -->
<div class="card" id="contextCard" style="display: none;">
  <div class="card-label">Context</div>
  <div id="contextContent">
    <div class="context-item">
      <span class="context-label">Last</span>
      <span class="context-value" id="lastChange">—</span>
    </div>
    <div class="context-item">
      <span class="context-label">Next</span>
      <span class="context-value" id="nextStep">—</span>
    </div>
    <div class="context-item" id="recentRow" style="display: none;">
      <span class="context-label">Recent</span>
      <span class="context-value" id="recentAction">—</span>
    </div>
  </div>
  <div class="context-time" id="syncTime"></div>
</div>

<!-- System Status (compact) -->
<div class="system-status" id="systemStatus">
  <span class="sys-item" id="sysFixonce" title="FixOnce Server">
    <span class="sys-dot"></span>Server
  </span>
  <span class="sys-item" id="sysExtension" title="Browser Extension">
    <span class="sys-dot"></span>Extension
  </span>
  <span class="sys-item" id="sysMemory" title="Project Memory">
    <span class="sys-dot"></span>Memory
  </span>
</div>

<!-- Footer -->
<div class="footer">
  <span>FixOnce — AI Memory Layer</span>
  <span class="footer-links">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="/security.html">Security</a>
  </span>
</div>

<script>
const API = window.location.origin;

async function fetchData() {
  try {
    const res = await fetch(`${API}/api/dashboard_snapshot`, {
      headers: { 'X-Dashboard': 'true' },
      signal: AbortSignal.timeout(5000)
    });
    if (!res.ok) return;

    const data = await res.json();
    render(data.snapshot || {});
  } catch (e) {
    console.error('Fetch error:', e);
  }
}

function render(s) {
  // Project
  const projectName = s.project_name || s.project_id || '—';
  const goal = s.current_goal || s.knowledge?.current_goal || '';
  document.getElementById('projectName').textContent = projectName;
  document.getElementById('projectGoal').textContent = goal || 'No active goal';

  // Active AI
  const activeAI = s.active_ai || s.ai_session?.editor || 'Unknown';
  document.getElementById('activeAI').textContent = capitalize(activeAI);

  // Status - Build status rows
  const statusEl = document.getElementById('statusContent');
  const rows = [];

  // Check for errors
  const errorCount = s.browser_errors?.length || s.error_count || 0;
  const hasAutoFix = s.has_auto_fix || s.auto_fix_available || false;

  if (hasAutoFix) {
    rows.push({
      icon: '✅',
      iconClass: 'status-fix',
      text: 'Fix ready — continue in AI',
      action: ''
    });
  }

  if (errorCount > 0) {
    rows.push({
      icon: '⚠️',
      iconClass: 'status-warn',
      text: `${errorCount} error${errorCount > 1 ? 's' : ''} — check in AI`,
      action: ''
    });
  }

  if (rows.length === 0) {
    rows.push({
      icon: '✓',
      iconClass: 'status-ok',
      text: 'No errors',
      action: ''
    });
  }

  statusEl.innerHTML = rows.map(r => `
    <div class="status-row">
      <span class="status-icon ${r.iconClass}">${r.icon}</span>
      <span class="status-text">${r.text}</span>
      ${r.action ? `<span class="status-action">${r.action}</span>` : ''}
    </div>
  `).join('');

  // Context - from intent/live_record
  const intent = s.intent || s.live_record?.intent || {};
  const lastChange = intent.last_change || '';
  const nextStep = intent.next_step || '';

  const contextCard = document.getElementById('contextCard');
  if (lastChange || nextStep) {
    contextCard.style.display = '';
    document.getElementById('lastChange').textContent = lastChange || '—';
    document.getElementById('nextStep').textContent = nextStep || '—';

    // Sync time - only show if recent (< 10 min)
    const updatedAt = intent.updated_at;
    const syncTimeEl = document.getElementById('syncTime');
    if (updatedAt) {
      const syncAge = Date.now() - new Date(updatedAt).getTime();
      const tenMinutes = 10 * 60 * 1000;
      if (syncAge < tenMinutes) {
        syncTimeEl.textContent = 'Synced ' + relativeTime(updatedAt);
        syncTimeEl.style.display = '';
      } else {
        syncTimeEl.style.display = 'none';
      }
    } else {
      syncTimeEl.style.display = 'none';
    }
  } else {
    contextCard.style.display = 'none';
  }

  // System Status (from real sources)
  const sys = s.system_status || {};

  // Server status - if we got data, server is up
  const sysFixonce = document.getElementById('sysFixonce');
  sysFixonce.className = 'sys-item ok';
  sysFixonce.title = 'FixOnce Server: Connected';

  // Extension status - from real heartbeat
  const sysExtension = document.getElementById('sysExtension');
  if (sys.extension?.connected) {
    sysExtension.className = 'sys-item ok';
    sysExtension.title = 'Browser Extension: Connected' +
      (sys.extension.last_seen ? ' (' + relativeTime(sys.extension.last_seen) + ')' : '');
  } else {
    sysExtension.className = 'sys-item warn';
    sysExtension.title = 'Browser Extension: Not detected';
  }

  // Memory status - from active project
  const sysMemory = document.getElementById('sysMemory');
  if (sys.memory?.loaded) {
    sysMemory.className = 'sys-item ok';
    sysMemory.title = 'Project Memory: Loaded (' + (sys.memory.project_id || 'unknown') + ')';
  } else {
    sysMemory.className = 'sys-item warn';
    sysMemory.title = 'Project Memory: Not loaded';
  }
}

function relativeTime(ts) {
  if (!ts) return '';
  const then = new Date(ts).getTime();
  if (isNaN(then)) return '';
  const diffMs = Date.now() - then;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  return `${Math.floor(diffHr / 24)}d ago`;
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
}

// Smart activity formatting - result, not technical action
function formatActivity(act) {
  if (!act) return null;

  const time = relativeTime(act.timestamp);
  let text = '';

  // MCP tools - semantic descriptions
  if (act.type === 'mcp_tool') {
    // Special case: fo_solved with fix description
    if (act.tool === 'fo_solved' && act.human_name?.startsWith('Fixed:')) {
      text = act.human_name;
    } else {
      const toolMap = {
        'fo_errors': 'Checked errors',
        'fo_apply': 'Applied fix',
        'fo_search': 'Searched memory',
        'fo_sync': 'Synced context',
        'fo_solved': 'Recorded solution',
        'fo_decide': 'Made decision',
        'update_work_context': 'Synced context',
        'get_browser_context': 'Checked browser'
      };
      text = toolMap[act.tool] || `Used ${act.tool}`;
    }
  }
  // File changes - use human_name, not filename
  else if (act.type === 'file_change') {
    const name = act.human_name || 'file';
    if (act.file_context === 'ui') {
      text = `Updated ${name}`;
    } else if (act.file_context === 'config') {
      text = `Changed ${name}`;
    } else {
      text = `Edited ${name}`;
    }
  }
  // Fallback
  else {
    text = act.human_name || act.tool || 'Activity';
  }

  return time ? `${text} (${time})` : text;
}

async function fetchActivity() {
  try {
    const res = await fetch(`${API}/api/activity/feed?limit=1`, {
      signal: AbortSignal.timeout(3000)
    });
    if (!res.ok) return;

    const data = await res.json();
    const latest = data.activities?.[0];

    const recentRow = document.getElementById('recentRow');
    const recentAction = document.getElementById('recentAction');

    if (latest) {
      const formatted = formatActivity(latest);
      if (formatted) {
        recentAction.textContent = formatted;
        recentRow.style.display = '';
      }
    }
  } catch (e) {
    console.error('Activity fetch error:', e);
  }
}

async function togglePower() {
  const toggle = document.getElementById('powerToggle');
  const newMode = toggle.checked ? 'full' : 'off';

  try {
    await fetch(`${API}/api/system/mode`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: newMode })
    });
    document.body.classList.toggle('powered-off', newMode === 'off');
    showToast(newMode === 'full' ? 'FixOnce ON' : 'FixOnce OFF');
  } catch (e) {
    toggle.checked = !toggle.checked;
  }
}

async function loadPowerState() {
  try {
    const res = await fetch(`${API}/api/system/mode`);
    if (res.ok) {
      const data = await res.json();
      const isOn = data.mode === 'full';
      document.getElementById('powerToggle').checked = isOn;
      document.body.classList.toggle('powered-off', !isOn);
    }
  } catch (e) {}
}

function showToast(msg, isError = false) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.textContent = msg;
  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// Init
loadPowerState();
fetchData();
fetchActivity();
setInterval(() => { fetchData(); fetchActivity(); }, 5000);
</script>
</body>
</html>
